name: Openstaller CI

on:
  push:
  pull_request:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Verify native identity backend
        run: ./build/openstaller-cli --hash-backend

  windows-mingw:
    name: windows-mingw
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
      - name: Configure
        shell: msys2 {0}
        run: cmake -S . -B build -G "MinGW Makefiles"
      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel
      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure
      - name: Verify native identity backend
        shell: msys2 {0}
        run: ./build/openstaller-cli.exe --hash-backend
